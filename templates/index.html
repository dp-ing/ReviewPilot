<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReviewPilot — Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200">
        <div class="max-w-6xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <span class="text-xl">🤖</span>
                <span class="font-bold text-gray-900">ReviewPilot</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-600">{{ user.login }}</span>
                <a href="/auth/logout" class="text-sm text-gray-500 hover:text-gray-700">登出</a>
            </div>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="mb-8">
            <h2 class="text-2xl font-bold text-gray-900">Dashboard</h2>
            <p class="text-gray-500 mt-1">欢迎回来，{{ user.login }}</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
            <div class="bg-white rounded-xl border border-gray-200 p-6">
                <div class="text-sm text-gray-500">总评审数</div>
                <div class="text-3xl font-bold text-gray-900 mt-2">--</div>
            </div>
            <div class="bg-white rounded-xl border border-gray-200 p-6">
                <div class="text-sm text-gray-500">发现问题</div>
                <div class="text-3xl font-bold text-gray-900 mt-2">--</div>
            </div>
            <div class="bg-white rounded-xl border border-gray-200 p-6">
                <div class="text-sm text-gray-500">已确认</div>
                <div class="text-3xl font-bold text-gray-900 mt-2">--</div>
            </div>
            <div class="bg-white rounded-xl border border-gray-200 p-6">
                <div class="text-sm text-gray-500">活跃仓库</div>
                <div class="text-3xl font-bold text-gray-900 mt-2">--</div>
            </div>
        </div>
    </main>
</body>
</html>
