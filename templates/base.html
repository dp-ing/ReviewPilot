<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}ReviewPilot{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    {% block head %}{% endblock %}
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white border-b border-gray-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 h-14 flex items-center justify-between">
            <div class="flex items-center gap-6">
                <a href="/" class="flex items-center gap-2 text-lg font-bold text-gray-900 no-underline">
                    <span>🤖</span>
                    <span>ReviewPilot</span>
                </a>
                {% if user %}
                <div class="hidden md:flex items-center gap-4 text-sm">
                    <a href="/" class="text-gray-600 hover:text-gray-900">Dashboard</a>
                    <a href="/reviews" class="text-gray-600 hover:text-gray-900">评审记录</a>
                    <a href="/repos" class="text-gray-600 hover:text-gray-900">仓库管理</a>
                </div>
                {% endif %}
            </div>
            <div class="flex items-center gap-3">
                {% if user %}
                <img src="{{ user.avatar_url or '' }}" alt="" class="w-7 h-7 rounded-full">
                <span class="text-sm text-gray-700">{{ user.login }}</span>
                <a href="/auth/logout" class="text-sm text-gray-400 hover:text-gray-600">登出</a>
                {% else %}
                <a href="/auth/login" class="text-sm text-gray-600 hover:text-gray-900">登录</a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="flex">
        {% if user %}
        <aside class="hidden lg:block w-56 bg-white border-r border-gray-200 min-h-[calc(100vh-3.5rem)] p-4">
            <nav class="space-y-1">
                <a href="/" class="block px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100 {% block nav_dashboard %}{% endblock %}">
                    📊 Dashboard
                </a>
                <a href="/reviews" class="block px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100 {% block nav_reviews %}{% endblock %}">
                    📋 评审记录
                </a>
                <a href="/repos" class="block px-3 py-2 rounded-lg text-sm text-gray-700 hover:bg-gray-100 {% block nav_repos %}{% endblock %}">
                    ⚙️ 仓库管理
                </a>
            </nav>
        </aside>
        {% endif %}

        <main class="flex-1 p-6">
            {% block content %}{% endblock %}
        </main>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
