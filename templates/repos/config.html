{% extends "base.html" %}
{% block title %}ReviewPilot — 仓库配置{% endblock %}
{% block nav_repos %}bg-gray-100 font-medium{% endblock %}
{% block content %}
<div class="mb-6">
    <a href="/repos" class="text-sm text-blue-600 hover:text-blue-800 mb-2 inline-block">← 返回仓库列表</a>
    <h2 class="text-2xl font-bold text-gray-900">仓库配置</h2>
    <p class="text-gray-500 mt-1">{{ repo.full_name }}</p>
</div>

{% include "repos/config_form.html" with context %}

{% if saved %}
<div id="save-toast" class="fixed bottom-6 right-6 bg-green-600 text-white px-4 py-2 rounded-lg shadow-lg text-sm">
    配置已保存 ✓
</div>
<script>
setTimeout(function() {
    var el = document.getElementById('save-toast');
    if (el) el.remove();
}, 2000);
</script>
{% endif %}
{% endblock %}
