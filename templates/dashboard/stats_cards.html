<div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8" id="stats-cards">
    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <div class="text-sm text-gray-500">总评审数</div>
        <div class="text-3xl font-bold text-gray-900 mt-2">{{ overview.total_reviews|default("--") }}</div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <div class="text-sm text-gray-500">发现问题</div>
        <div class="text-3xl font-bold text-gray-900 mt-2">{{ overview.total_issues|default("--") }}</div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <div class="text-sm text-gray-500">Critical</div>
        <div class="text-3xl font-bold text-red-600 mt-2">{{ overview.critical_count|default("--") }}</div>
    </div>
    <div class="bg-white rounded-xl border border-gray-200 p-6">
        <div class="text-sm text-gray-500">活跃仓库</div>
        <div class="text-3xl font-bold text-gray-900 mt-2">{{ overview.active_repos|default("--") }}</div>
    </div>
</div>
